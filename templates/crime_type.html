<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>犯罪类型维度分析</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; overflow-y: auto; }
        .content { margin-left: 250px; padding: 2rem; }
        .nav-item { padding: 1rem 1.5rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #f3f4f6; }
        .nav-item.active { background: #fae8ff; color: #a855f7; border-left-color: #a855f7; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-6 border-b">
            <a href="/" class="text-sm text-purple-600 hover:text-purple-800 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                返回首页
            </a>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">犯罪类型维度</h2>
        </div>
        <nav>
            <div class="nav-item active" data-type="domestic">家暴与非家暴</div>
            <div class="nav-item" data-type="structure">犯罪类型结构变化</div>
        </nav>
    </div>

    <div class="content">
        <div id="analysis-details-container">
            <div id="analysis-content" class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start"></div>
        </div>
    </div>

    <div id="tooltip" class="custom-tooltip"></div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script type="module">
        import * as api from '{{ url_for("static", filename="js/api.js") }}';
        import * as charts from '{{ url_for("static", filename="js/charts.js") }}';

        const configs = {
            domestic: {
                html: `<div class="glass-card p-8 xl:col-span-3"><h3 class="text-lg font-bold text-slate-800 mb-6">家暴案件趋势</h3><div id="detail-chart-1" class="h-[400px] w-full"></div></div><div class="glass-card p-8 xl:col-span-3"><h3 class="text-lg font-bold text-slate-800 mb-6">家暴/非家暴比值趋势</h3><div id="detail-chart-2" class="h-[400px] w-full"></div></div>`,
                action: async () => {
                    const trendData = await api.fetchDomesticTrend();
                    if (!trendData || trendData.length === 0) return;
                    const ratioData = trendData.map(d => ({
                        year: d.year,
                        ratio: d.non_domestic_cnt > 0 ? (d.domestic_cnt / d.non_domestic_cnt) : 0
                    }));
                    const draw = () => {
                        charts.drawLineChart("detail-chart-1", trendData, d => d.year, d => d.domestic_cnt, charts.colors.rose, " 宗");
                        charts.drawRatioChart("detail-chart-2", ratioData, d => d.year, d => d.ratio);
                    };
                    draw();
                    charts.registerChart("detail-chart-1", draw);
                    charts.registerChart("detail-chart-2", draw);
                }
            },
            structure: {
                html: `<div class="glass-card p-8 xl:col-span-3"><h3 class="text-lg font-bold text-slate-800 mb-6">犯罪类型结构性变化 <span class="text-sm font-normal text-slate-500">（2001-2005 vs 2019-2023）</span></h3><div id="detail-chart-3" class="h-[600px] w-full"></div></div>`,
                action: async () => {
                    const structureData = await api.fetchCrimeTypeStructureChange();
                    if (!structureData || structureData.length === 0) return;
                    const draw = () => {
                        charts.drawButterflyChart("detail-chart-3", structureData, d => d.primary_type, d => d.period1_cnt, d => d.period2_cnt);
                    };
                    draw();
                    charts.registerChart("detail-chart-3", draw);
                }
            }
        };

        async function loadAnalysis(type) {
            const content = document.getElementById('analysis-content');
            const config = configs[type];
            content.innerHTML = config.html;
            await config.action();
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                loadAnalysis(item.dataset.type);
            });
        });

        loadAnalysis('domestic');
    </script>
</body>
</html>
