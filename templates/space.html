<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间维度分析</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; overflow-y: auto; }
        .content { margin-left: 250px; padding: 2rem; }
        .nav-item { padding: 1rem 1.5rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #f3f4f6; }
        .nav-item.active { background: #d1fae5; color: #10b981; border-left-color: #10b981; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-6 border-b">
            <a href="/" class="text-sm text-green-600 hover:text-green-800 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                返回首页
            </a>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">空间维度</h2>
        </div>
        <nav>
            <div class="nav-item active" data-type="district">警区案件排行</div>
            <div class="nav-item" data-type="locations">高危案发场所</div>
            <div class="nav-item" data-type="concentration">街区犯罪集中度</div>
        </nav>
    </div>

    <div class="content">
        <div id="analysis-details-container">
            <div id="analysis-content" class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start"></div>
        </div>
    </div>

    <div id="tooltip" class="custom-tooltip"></div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script type="module">
        import * as api from '{{ url_for("static", filename="js/api.js") }}';
        import * as charts from '{{ url_for("static", filename="js/charts.js") }}';

        const configs = {
            district: {
                html: `<div class="glass-card p-8 xl:col-span-2"><div class="flex flex-col gap-2 mb-6"><h3 class="text-lg font-bold text-slate-800">各警区案件分布地图</h3><p class="text-sm text-slate-500">按警区边界进行着色，颜色越深表示该警区案件总量越高。</p></div><div id="detail-chart-1" class="h-[600px] w-full"></div></div><div class="glass-card p-8"><div class="mb-6"><label class="text-xs font-semibold text-slate-400 mb-2 block">案件类型筛选</label><select id="crime-type-select" class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-green-500"><option value="">全部案件</option><option value="THEFT">盗窃 THEFT</option><option value="ASSAULT">袭击 ASSAULT</option><option value="DECEPTIVE PRACTICE">欺诈 DECEPTIVE PRACTICE</option><option value="BURGLARY">入室盗窃 BURGLARY</option><option value="MOTOR VEHICLE THEFT">机动车盗窃 MOTOR VEHICLE THEFT</option><option value="ROBBERY">抢劫 ROBBERY</option><option value="NARCOTICS">毒品 NARCOTICS</option><option value="CRIMINAL TRESPASS">非法侵入 CRIMINAL TRESPASS</option><option value="WEAPONS VIOLATION">武器违规 WEAPONS VIOLATION</option><option value="OFFENSE INVOLVING CHILDREN">涉及儿童犯罪 OFFENSE INVOLVING CHILDREN</option><option value="SEX OFFENSE">性犯罪 SEX OFFENSE</option><option value="HOMICIDE">凶杀 HOMICIDE</option><option value="ARSON">纵火 ARSON</option></select></div><div class="district-focus-card p-4 rounded-3xl mb-6"><div id="district-focus-card"></div></div><div class="flex items-center justify-between gap-4 mb-6"><h3 class="text-lg font-bold text-slate-800">警区案件热度排行</h3><span class="text-xs font-semibold text-slate-400">悬停或点击地图即可跟随</span></div><div id="district-top-list" class="space-y-4 max-h-[420px] overflow-y-auto pr-2"></div></div>`,
                action: async () => {
                    const geojson = await api.fetchGeoJSON();
                    const select = document.getElementById('crime-type-select');
                    let lockedDistrict = null, hoverDistrict = null;
                    const loadData = async (type) => {
                        const data = await api.fetchDistrictCrimes(type);
                        const districtNameMap = new Map((geojson?.features || []).map(feature => [String(feature.properties?.district || "").trim().replace(/^0+/, ''), String(feature.properties?.district_name || "").trim()]));
                        const districtData = (data || []).map(item => {
                            const dId = String(item.district).trim().replace(/^0+/, '');
                            return {...item, district: dId, district_name: districtNameMap.get(dId) || `警区 ${dId}`, cnt: Number(item.cnt)};
                        }).filter(item => item.district && Number.isFinite(item.cnt)).sort((a, b) => b.cnt - a.cnt);
                        lockedDistrict = districtData[0]?.district || null;
                        const syncState = () => {
                            const active = hoverDistrict || lockedDistrict;
                            charts.setDistrictFollowState("detail-chart-1", "district-top-list", active, lockedDistrict);
                            charts.renderDistrictFocus("district-focus-card", districtData, active, "cnt", "案件总数");
                        };
                        const draw = () => {
                            charts.drawDistrictChoroplethMap("detail-chart-1", geojson, districtData, "cnt", "案件总量", {
                                onHover: d => { hoverDistrict = d; syncState(); },
                                onLeave: () => { hoverDistrict = null; syncState(); },
                                onSelect: d => { lockedDistrict = d; syncState(); }
                            });
                            charts.renderDistrictRanking("district-top-list", districtData, "cnt", "案件总数", {
                                limit: 10,
                                onHover: d => { hoverDistrict = d; syncState(); },
                                onLeave: () => { hoverDistrict = null; syncState(); },
                                onSelect: d => { lockedDistrict = d; syncState(); }
                            });
                            syncState();
                        };
                        draw();
                        charts.registerChart("detail-chart-1", draw);
                    };
                    select.addEventListener('change', () => loadData(select.value));
                    await loadData('');
                }
            },
            locations: {
                html: `<div class="glass-card p-8 xl:col-span-2"><h3 class="text-lg font-bold text-slate-800 mb-6">Top 10 犯罪高发场所类型</h3><div id="detail-chart-1" class="h-[500px] w-full"></div></div><div class="glass-card p-8 flex flex-col"><div class="mb-6"><label class="text-xs font-semibold text-slate-400 mb-2 block">案件类型筛选</label><select id="location-crime-type-select" class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-green-500"><option value="">全部案件</option><option value="THEFT">盗窃 THEFT</option><option value="ASSAULT">袭击 ASSAULT</option><option value="DECEPTIVE PRACTICE">欺诈 DECEPTIVE PRACTICE</option><option value="BURGLARY">入室盗窃 BURGLARY</option><option value="MOTOR VEHICLE THEFT">机动车盗窃 MOTOR VEHICLE THEFT</option><option value="ROBBERY">抢劫 ROBBERY</option><option value="NARCOTICS">毒品 NARCOTICS</option><option value="CRIMINAL TRESPASS">非法侵入 CRIMINAL TRESPASS</option><option value="WEAPONS VIOLATION">武器违规 WEAPONS VIOLATION</option><option value="OFFENSE INVOLVING CHILDREN">涉及儿童犯罪 OFFENSE INVOLVING CHILDREN</option><option value="SEX OFFENSE">性犯罪 SEX OFFENSE</option><option value="HOMICIDE">凶杀 HOMICIDE</option><option value="ARSON">纵火 ARSON</option></select></div><h3 class="text-lg font-bold text-slate-800 mb-6">场所类型风险评估</h3><div id="location-risk-list" class="flex-1 space-y-3 overflow-y-auto max-h-[450px] pr-2"></div><div class="mt-6 pt-6 border-t border-slate-100"><div class="flex items-center gap-3 p-4 rounded-2xl bg-amber-50 text-amber-700"><div class="text-xl"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div><div class="text-xs font-medium">街道与住宅是案件发生最频繁的区域，请在这些区域保持警惕。</div></div></div></div>`,
                action: async () => {
                    const select = document.getElementById('location-crime-type-select');
                    const loadData = async (type) => {
                        const data = await api.fetchTopLocations(type);
                        const draw = () => charts.drawHorizontalBarChart("detail-chart-1", data, d => d.location_description, d => d.cnt, charts.colors.amber, { left: 260, right: 80 });
                        draw();
                        charts.registerChart("detail-chart-1", draw);
                        const total = d3.sum(data, d => d.cnt), list = document.getElementById('location-risk-list');
                        list.innerHTML = data.map(d => {
                            const percent = (d.cnt / total * 100).toFixed(1) + "%";
                            return `<div class="group p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-amber-200 hover:bg-amber-50/30 transition-all cursor-default"><div class="flex justify-between items-center mb-2"><span class="text-sm font-bold text-slate-700 group-hover:text-amber-700 transition-colors">${d.location_description}</span><span class="text-xs font-bold text-slate-400">${d.cnt.toLocaleString()}</span></div><div class="flex items-center gap-3"><div class="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-amber-400" style="width: ${percent}"></div></div><span class="text-[10px] font-black text-slate-400 w-8">${percent}</span></div></div>`;
                        }).join('');
                    };
                    select.addEventListener('change', () => loadData(select.value));
                    await loadData('');
                }
            },
            concentration: {
                html: `<div class="glass-card p-8 xl:col-span-3"><div class="flex flex-col gap-2 mb-6"><h3 class="text-lg font-bold text-slate-800">街区犯罪集中度分析</h3><p class="text-sm text-slate-500">洛伦兹曲线展示犯罪在不同街区的集中程度，曲线越弯曲表示犯罪越集中于少数街区。</p></div><div class="mb-6"><label class="text-xs font-semibold text-slate-400 mb-2 block">案件类型筛选</label><select id="concentration-type-select" class="w-full max-w-xs px-4 py-2 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-purple-500"><option value="">全部案件</option><option value="THEFT">盗窃 THEFT</option><option value="ASSAULT">袭击 ASSAULT</option><option value="DECEPTIVE PRACTICE">欺诈 DECEPTIVE PRACTICE</option><option value="BURGLARY">入室盗窃 BURGLARY</option><option value="MOTOR VEHICLE THEFT">机动车盗窃 MOTOR VEHICLE THEFT</option><option value="ROBBERY">抢劫 ROBBERY</option><option value="NARCOTICS">毒品 NARCOTICS</option><option value="CRIMINAL TRESPASS">非法侵入 CRIMINAL TRESPASS</option><option value="WEAPONS VIOLATION">武器违规 WEAPONS VIOLATION</option><option value="OFFENSE INVOLVING CHILDREN">涉及儿童犯罪 OFFENSE INVOLVING CHILDREN</option><option value="SEX OFFENSE">性犯罪 SEX OFFENSE</option><option value="HOMICIDE">凶杀 HOMICIDE</option><option value="ARSON">纵火 ARSON</option></select></div><div class="grid grid-cols-1 xl:grid-cols-3 gap-6"><div class="xl:col-span-2"><div id="lorenz-chart" class="h-[500px] w-full"></div></div><div class="space-y-4"><div class="p-6 rounded-2xl bg-gradient-to-br from-purple-50 to-indigo-50 border border-purple-100"><div class="text-xs font-semibold text-purple-600 mb-2">基尼系数</div><div class="text-3xl font-black text-purple-700" id="gini-value">-</div><div class="text-xs text-purple-500 mt-2">数值越大，犯罪越集中</div></div><div class="p-6 rounded-2xl bg-slate-50 border border-slate-200"><div class="text-xs font-semibold text-slate-600 mb-3">集中度解读</div><div id="concentration-insight" class="text-sm text-slate-700 leading-relaxed"></div></div><div class="p-6 rounded-2xl bg-slate-50 border border-slate-200"><div class="text-xs font-semibold text-slate-600 mb-3">关键数据</div><div id="key-stats" class="space-y-2 text-sm text-slate-700"></div></div></div></div></div>`,
                action: async () => {
                    const select = document.getElementById('concentration-type-select');
                    const loadData = async (type) => {
                    const data = await api.fetchBlockConcentration(type);
                    const total = data.reduce((s, d) => s + d.cnt, 0);
                    let cumCrimes = 0, cumBlocks = 0, lorenzData = [{x: 0, y: 0}];
                    data.forEach((d, i) => {
                        cumCrimes += d.cnt;
                        cumBlocks += 1;
                        lorenzData.push({x: cumBlocks / data.length * 100, y: cumCrimes / total * 100});
                    });
                    const gini = 1 - d3.sum(lorenzData.slice(1), (d, i) => (lorenzData[i].x + d.x) * (d.y - lorenzData[i].y)) / 10000;

                    const svg = d3.select('#lorenz-chart').append('svg').attr('width', '100%').attr('height', '100%');
                    const box = svg.node().getBoundingClientRect();
                    const m = {t: 40, r: 40, b: 60, l: 60}, w = box.width - m.l - m.r, h = box.height - m.t - m.b;
                    const g = svg.append('g').attr('transform', `translate(${m.l},${m.t})`);

                    const x = d3.scaleLinear().domain([0, 100]).range([0, w]);
                    const y = d3.scaleLinear().domain([0, 100]).range([h, 0]);

                    g.append('defs').append('linearGradient').attr('id', 'lorenz-grad').attr('x1', '0%').attr('y1', '0%').attr('x2', '0%').attr('y2', '100%')
                        .selectAll('stop').data([{offset: '0%', color: '#8b5cf6'}, {offset: '100%', color: '#6366f1'}]).join('stop')
                        .attr('offset', d => d.offset).attr('stop-color', d => d.color);

                    g.append('line').attr('x1', 0).attr('y1', h).attr('x2', w).attr('y2', 0).attr('stroke', '#cbd5e1').attr('stroke-width', 2).attr('stroke-dasharray', '5,5');

                    const area = d3.area().x(d => x(d.x)).y0(h).y1(d => y(d.y)).curve(d3.curveMonotoneX);
                    g.append('path').datum(lorenzData).attr('d', area).attr('fill', 'url(#lorenz-grad)').attr('opacity', 0.2);

                    const line = d3.line().x(d => x(d.x)).y(d => y(d.y)).curve(d3.curveMonotoneX);
                    g.append('path').datum(lorenzData).attr('d', line).attr('fill', 'none').attr('stroke', 'url(#lorenz-grad)').attr('stroke-width', 3);

                    const idx20 = Math.floor(lorenzData.length * 0.2);
                    const pt20 = lorenzData[idx20];
                    g.append('circle').attr('cx', x(pt20.x)).attr('cy', y(pt20.y)).attr('r', 6).attr('fill', '#8b5cf6').attr('stroke', '#fff').attr('stroke-width', 3);
                    g.append('line').attr('x1', x(pt20.x)).attr('y1', y(pt20.y)).attr('x2', x(pt20.x)).attr('y2', h).attr('stroke', '#8b5cf6').attr('stroke-width', 1.5).attr('stroke-dasharray', '3,3').attr('opacity', 0.6);
                    g.append('line').attr('x1', 0).attr('y1', y(pt20.y)).attr('x2', x(pt20.x)).attr('y2', y(pt20.y)).attr('stroke', '#8b5cf6').attr('stroke-width', 1.5).attr('stroke-dasharray', '3,3').attr('opacity', 0.6);

                    g.append('g').attr('transform', `translate(0,${h})`).call(d3.axisBottom(x).ticks(5).tickFormat(d => d + '%')).selectAll('text').style('font-size', '12px').style('fill', '#64748b');
                    g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d => d + '%')).selectAll('text').style('font-size', '12px').style('fill', '#64748b');

                    g.append('text').attr('x', w / 2).attr('y', h + 45).attr('text-anchor', 'middle').style('font-size', '13px').style('fill', '#64748b').style('font-weight', '600').text('街区累计占比 (%)');
                    g.append('text').attr('transform', 'rotate(-90)').attr('x', -h / 2).attr('y', -45).attr('text-anchor', 'middle').style('font-size', '13px').style('fill', '#64748b').style('font-weight', '600').text('犯罪累计占比 (%)');

                    document.getElementById('gini-value').textContent = gini.toFixed(3);
                    document.getElementById('concentration-insight').innerHTML = `<span class="text-2xl font-black text-slate-800">${pt20.y.toFixed(1)}%</span> 的案件<br>集中在 <span class="text-2xl font-black text-purple-600">20%</span> 的街区`;

                    const top10 = data.slice(0, 10).reduce((s, d) => s + d.cnt, 0);
                    const top10Pct = (top10 / total * 100).toFixed(1);
                    document.getElementById('key-stats').innerHTML = `<div>总街区数: <span class="font-bold">${data.length.toLocaleString()}</span></div><div>总案件数: <span class="font-bold">${total.toLocaleString()}</span></div><div>前10街区占比: <span class="font-bold text-purple-600">${top10Pct}%</span></div>`;
                    };
                    select.addEventListener('change', () => { d3.select('#lorenz-chart').selectAll('*').remove(); loadData(select.value); });
                    await loadData('');
                }
            }
        };

        async function loadAnalysis(type) {
            const content = document.getElementById('analysis-content');
            const config = configs[type];
            content.innerHTML = config.html;
            await config.action();
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                loadAnalysis(item.dataset.type);
            });
        });

        loadAnalysis('district');
    </script>
</body>
</html>
