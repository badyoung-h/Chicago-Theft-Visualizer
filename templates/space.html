<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间维度分析</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; overflow-y: auto; }
        .content { margin-left: 250px; padding: 2rem; }
        .nav-item { padding: 1rem 1.5rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: #f3f4f6; }
        .nav-item.active { background: #d1fae5; color: #10b981; border-left-color: #10b981; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-6 border-b">
            <a href="/" class="text-sm text-green-600 hover:text-green-800 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                返回首页
            </a>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">空间维度</h2>
        </div>
        <nav>
            <div class="nav-item active" data-type="district">警区案件排行</div>
            <div class="nav-item" data-type="locations">高危案发场所</div>
            <div class="nav-item" data-type="theft">盗窃专项分析</div>
        </nav>
    </div>

    <div class="content">
        <div id="analysis-details-container">
            <div id="analysis-content" class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start"></div>
        </div>
    </div>

    <div id="tooltip" class="custom-tooltip"></div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script type="module">
        import * as api from '{{ url_for("static", filename="js/api.js") }}';
        import * as charts from '{{ url_for("static", filename="js/charts.js") }}';

        const configs = {
            district: {
                html: `<div class="glass-card p-8 xl:col-span-2"><div class="flex flex-col gap-2 mb-6"><h3 class="text-lg font-bold text-slate-800">各警区案件分布地图</h3><p class="text-sm text-slate-500">按警区边界进行着色，颜色越深表示该警区案件总量越高。</p></div><div id="detail-chart-1" class="h-[600px] w-full"></div></div><div class="glass-card p-8"><div class="mb-6"><label class="text-xs font-semibold text-slate-400 mb-2 block">案件类型筛选</label><select id="crime-type-select" class="w-full px-4 py-2 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-green-500"><option value="">全部案件</option><option value="THEFT">盗窃 THEFT</option><option value="BATTERY">殴打 BATTERY</option><option value="CRIMINAL DAMAGE">刑事损害 CRIMINAL DAMAGE</option><option value="ASSAULT">袭击 ASSAULT</option><option value="DECEPTIVE PRACTICE">欺诈 DECEPTIVE PRACTICE</option><option value="BURGLARY">入室盗窃 BURGLARY</option><option value="MOTOR VEHICLE THEFT">机动车盗窃 MOTOR VEHICLE THEFT</option><option value="ROBBERY">抢劫 ROBBERY</option><option value="NARCOTICS">毒品 NARCOTICS</option><option value="CRIMINAL TRESPASS">非法侵入 CRIMINAL TRESPASS</option><option value="WEAPONS VIOLATION">武器违规 WEAPONS VIOLATION</option><option value="OFFENSE INVOLVING CHILDREN">涉及儿童犯罪 OFFENSE INVOLVING CHILDREN</option><option value="SEX OFFENSE">性犯罪 SEX OFFENSE</option><option value="HOMICIDE">凶杀 HOMICIDE</option><option value="ARSON">纵火 ARSON</option></select></div><div class="district-focus-card p-4 rounded-3xl mb-6"><div id="district-focus-card"></div></div><div class="flex items-center justify-between gap-4 mb-6"><h3 class="text-lg font-bold text-slate-800">警区案件热度排行</h3><span class="text-xs font-semibold text-slate-400">悬停或点击地图即可跟随</span></div><div id="district-top-list" class="space-y-4 max-h-[420px] overflow-y-auto pr-2"></div></div>`,
                action: async () => {
                    const geojson = await api.fetchGeoJSON();
                    const select = document.getElementById('crime-type-select');
                    let lockedDistrict = null, hoverDistrict = null;
                    const loadData = async (type) => {
                        const data = await api.fetchDistrictCrimes(type);
                        const districtNameMap = new Map((geojson?.features || []).map(feature => [String(feature.properties?.district || "").trim().replace(/^0+/, ''), String(feature.properties?.district_name || "").trim()]));
                        const districtData = (data || []).map(item => {
                            const dId = String(item.district).trim().replace(/^0+/, '');
                            return {...item, district: dId, district_name: districtNameMap.get(dId) || `警区 ${dId}`, cnt: Number(item.cnt)};
                        }).filter(item => item.district && Number.isFinite(item.cnt)).sort((a, b) => b.cnt - a.cnt);
                        lockedDistrict = districtData[0]?.district || null;
                        const syncState = () => {
                            const active = hoverDistrict || lockedDistrict;
                            charts.setDistrictFollowState("detail-chart-1", "district-top-list", active, lockedDistrict);
                            charts.renderDistrictFocus("district-focus-card", districtData, active, "cnt", "案件总数");
                        };
                        const draw = () => {
                            charts.drawDistrictChoroplethMap("detail-chart-1", geojson, districtData, "cnt", "案件总量", {
                                onHover: d => { hoverDistrict = d; syncState(); },
                                onLeave: () => { hoverDistrict = null; syncState(); },
                                onSelect: d => { lockedDistrict = d; syncState(); }
                            });
                            charts.renderDistrictRanking("district-top-list", districtData, "cnt", "案件总数", {
                                limit: 10,
                                onHover: d => { hoverDistrict = d; syncState(); },
                                onLeave: () => { hoverDistrict = null; syncState(); },
                                onSelect: d => { lockedDistrict = d; syncState(); }
                            });
                            syncState();
                        };
                        draw();
                        charts.registerChart("detail-chart-1", draw);
                    };
                    select.addEventListener('change', () => loadData(select.value));
                    await loadData('');
                }
            },
            locations: {
                html: `<div class="glass-card p-8 xl:col-span-2"><h3 class="text-lg font-bold text-slate-800 mb-6">Top 10 犯罪高发场所类型</h3><div id="detail-chart-1" class="h-[500px] w-full"></div></div><div class="glass-card p-8 flex flex-col"><h3 class="text-lg font-bold text-slate-800 mb-6">场所类型风险评估</h3><div id="location-risk-list" class="flex-1 space-y-3 overflow-y-auto max-h-[450px] pr-2"></div><div class="mt-6 pt-6 border-t border-slate-100"><div class="flex items-center gap-3 p-4 rounded-2xl bg-amber-50 text-amber-700"><div class="text-xl"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div><div class="text-xs font-medium">街道与住宅是案件发生最频繁的区域，请在这些区域保持警惕。</div></div></div></div>`,
                action: async () => {
                    const data = await api.fetchTopLocations();
                    const draw = () => charts.drawHorizontalBarChart("detail-chart-1", data, d => d.location_description, d => d.cnt, charts.colors.amber, { left: 260, right: 80 });
                    draw();
                    charts.registerChart("detail-chart-1", draw);
                    const total = d3.sum(data, d => d.cnt), list = document.getElementById('location-risk-list');
                    list.innerHTML = data.map(d => {
                        const percent = (d.cnt / total * 100).toFixed(1) + "%";
                        return `<div class="group p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-amber-200 hover:bg-amber-50/30 transition-all cursor-default"><div class="flex justify-between items-center mb-2"><span class="text-sm font-bold text-slate-700 group-hover:text-amber-700 transition-colors">${d.location_description}</span><span class="text-xs font-bold text-slate-400">${d.cnt.toLocaleString()}</span></div><div class="flex items-center gap-3"><div class="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-amber-400" style="width: ${percent}"></div></div><span class="text-[10px] font-black text-slate-400 w-8">${percent}</span></div></div>`;
                    }).join('');
                }
            },
            theft: {
                html: `<div class="glass-card p-8 xl:col-span-2"><div class="flex flex-col gap-2 mb-6"><h3 class="text-lg font-bold text-slate-800">盗窃案件警区分布地图</h3><p class="text-sm text-slate-500">专项分析盗窃类案件在各警区的分布情况。</p></div><div id="detail-chart-1" class="h-[600px] w-full"></div></div><div class="glass-card p-8"><div class="district-focus-card p-4 rounded-3xl mb-6"><div id="theft-focus-card"></div></div><div class="flex items-center justify-between gap-4 mb-6"><h3 class="text-lg font-bold text-slate-800">盗窃案件热度排行</h3><span class="text-xs font-semibold text-slate-400">悬停或点击地图即可跟随</span></div><div id="theft-top-list" class="space-y-4 max-h-[420px] overflow-y-auto pr-2"></div></div>`,
                action: async () => {
                    const [data, geojson] = await Promise.all([api.fetchTheftByDistrict(), api.fetchGeoJSON()]);
                    const districtNameMap = new Map((geojson?.features || []).map(feature => [String(feature.properties?.district || "").trim().replace(/^0+/, ''), String(feature.properties?.district_name || "").trim()]));
                    const theftData = (data || []).map(item => {
                        const dId = String(item.district).trim().replace(/^0+/, '');
                        return {...item, district: dId, district_name: districtNameMap.get(dId) || `警区 ${dId}`, theft_cnt: Number(item.theft_cnt)};
                    }).filter(item => item.district && Number.isFinite(item.theft_cnt)).sort((a, b) => b.theft_cnt - a.theft_cnt);
                    let lockedDistrict = theftData[0]?.district || null, hoverDistrict = null;
                    const syncState = () => {
                        const active = hoverDistrict || lockedDistrict;
                        charts.setDistrictFollowState("detail-chart-1", "theft-top-list", active, lockedDistrict);
                        charts.renderDistrictFocus("theft-focus-card", theftData, active, "theft_cnt", "盗窃案件");
                    };
                    const draw = () => {
                        charts.drawDistrictChoroplethMap("detail-chart-1", geojson, theftData, "theft_cnt", "盗窃案件", {
                            onHover: d => { hoverDistrict = d; syncState(); },
                            onLeave: () => { hoverDistrict = null; syncState(); },
                            onSelect: d => { lockedDistrict = d; syncState(); }
                        });
                        charts.renderDistrictRanking("theft-top-list", theftData, "theft_cnt", "盗窃案件", {
                            limit: 10,
                            onHover: d => { hoverDistrict = d; syncState(); },
                            onLeave: () => { hoverDistrict = null; syncState(); },
                            onSelect: d => { lockedDistrict = d; syncState(); }
                        });
                        syncState();
                    };
                    draw();
                    charts.registerChart("detail-chart-1", draw);
                }
            }
        };

        async function loadAnalysis(type) {
            const content = document.getElementById('analysis-content');
            const config = configs[type];
            content.innerHTML = config.html;
            await config.action();
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                loadAnalysis(item.dataset.type);
            });
        });

        loadAnalysis('district');
    </script>
</body>
</html>
